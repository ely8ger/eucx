version: "3.9"

# ─── EUCX Production Stack ────────────────────────────────────────────────────
# Run: docker compose -f docker-compose.prod.yml up -d
# Secrets via .env.production (never commit this file)
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── PostgreSQL 16 — Production Tuned ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eucx_postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-eucx}
      POSTGRES_USER:     ${POSTGRES_USER:-eucx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c max_connections=200
        -c max_worker_processes=8
        -c max_parallel_workers_per_gather=4
        -c max_parallel_workers=8
        -c wal_level=replica
        -c archive_mode=off
        -c log_min_duration_statement=500
        -c log_checkpoints=on
        -c log_connections=off
        -c log_disconnections=off
        -c log_lock_waits=on
        -c log_temp_files=0
        -c autovacuum=on
        -c autovacuum_max_workers=3
        -c autovacuum_naptime=1min
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eucx} -d ${POSTGRES_DB:-eucx}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M

  # ── Redis 7 — Cache & BullMQ ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eucx_redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --appendonly yes
        --appendfsync everysec
        --hz 20
        --loglevel notice
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
        reservations:
          memory: 128M

  # ── NestJS API ───────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPO_OWNER:-eucx}/eucx-api:${API_IMAGE_TAG:-latest}
    container_name: eucx_api
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:           production
      PORT:               3001
      DATABASE_URL:       postgresql://${POSTGRES_USER:-eucx}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eucx}?schema=public&connection_limit=20&pool_timeout=20
      REDIS_URL:          redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:         ${JWT_SECRET}
      JWT_EXPIRES_IN:     ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS:      ${BCRYPT_ROUNDS:-12}
      SMTP_HOST:          ${SMTP_HOST}
      SMTP_PORT:          ${SMTP_PORT:-587}
      SMTP_USER:          ${SMTP_USER}
      SMTP_PASS:          ${SMTP_PASS}
      SMTP_FROM:          ${SMTP_FROM:-noreply@eucx.exchange}
      WEBHOOK_SECRET:     ${WEBHOOK_SECRET}
      INTERNAL_API_KEY:   ${INTERNAL_API_KEY}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M

  # ── Next.js Web ───────────────────────────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPO_OWNER:-eucx}/eucx-web:${WEB_IMAGE_TAG:-latest}
    container_name: eucx_web
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV:                production
      PORT:                    3000
      NEXTAUTH_URL:            ${NEXTAUTH_URL:-https://eucx.exchange}
      NEXTAUTH_SECRET:         ${NEXTAUTH_SECRET}
      DATABASE_URL:            postgresql://${POSTGRES_USER:-eucx}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eucx}?schema=public
      NEXT_PUBLIC_API_URL:     ${NEXT_PUBLIC_API_URL:-https://api.eucx.exchange}
      NEXT_PUBLIC_WS_URL:      ${NEXT_PUBLIC_WS_URL:-wss://api.eucx.exchange}
      INTERNAL_API_URL:        http://api:3001
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M

  # ── Nginx — SSL Termination & Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: eucx_nginx
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/eucx.conf:/etc/nginx/conf.d/eucx.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Certbot — SSL Certificate Renewal ────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: eucx_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Initial cert: docker compose run --rm certbot certonly --webroot
    #   -w /var/www/certbot -d eucx.exchange -d api.eucx.exchange
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet --webroot -w /var/www/certbot;
          sleep 12h & wait $${!};
        done"
    networks:
      - internal

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: eucx_prometheus
    restart: unless-stopped
    logging: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: eucx_grafana
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_DOMAIN:           grafana.eucx.exchange
      GF_SERVER_ROOT_URL:         https://grafana.eucx.exchange
      GF_SMTP_ENABLED:            "true"
      GF_SMTP_HOST:               ${SMTP_HOST}:${SMTP_PORT:-587}
      GF_SMTP_USER:               ${SMTP_USER}
      GF_SMTP_PASSWORD:           ${SMTP_PASS}
      GF_SMTP_FROM_ADDRESS:       grafana@eucx.exchange
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local
