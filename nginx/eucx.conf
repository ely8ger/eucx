# ─── EUCX Nginx Virtual Hosts ─────────────────────────────────────────────────
# Domains: eucx.exchange, api.eucx.exchange, grafana.eucx.exchange
# SSL: Let's Encrypt via Certbot webroot
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream: NestJS API (2 replicas via Docker internal DNS) ─────────────────
upstream eucx_api {
    least_conn;
    server api:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── Upstream: Next.js Web ─────────────────────────────────────────────────────
upstream eucx_web {
    server web:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ── Upstream: Grafana ─────────────────────────────────────────────────────────
upstream eucx_grafana {
    server grafana:3000 max_fails=2 fail_timeout=30s;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect (port 80)
# Also serves ACME challenge for Certbot
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name eucx.exchange api.eucx.exchange grafana.eucx.exchange;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# eucx.exchange — Next.js Frontend
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name eucx.exchange;

    # ── SSL ────────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/eucx.exchange/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eucx.exchange/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/eucx.exchange/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://api.eucx.exchange https://api.eucx.exchange; font-src 'self'; frame-ancestors 'none';" always;

    # ── Next.js static assets ──────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://eucx_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_hide_header X-Powered-By;
    }

    # ── Main proxy to Next.js ──────────────────────────────────────────────────
    location / {
        limit_conn conn_limit_per_ip 50;

        proxy_pass         http://eucx_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    on;
        proxy_hide_header  X-Powered-By;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# api.eucx.exchange — NestJS Backend API
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.eucx.exchange;

    ssl_certificate     /etc/letsencrypt/live/eucx.exchange/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eucx.exchange/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/eucx.exchange/chain.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ── WebSocket — Socket.IO ──────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://eucx_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Auth endpoints — strict rate limit ────────────────────────────────────
    location ~ ^/api/v1/auth/(login|register|refresh) {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://eucx_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Order endpoints — trading rate limit ──────────────────────────────────
    location ~ ^/api/v1/orders {
        limit_req zone=api_orders burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://eucx_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Public endpoints — CDN-cacheable ──────────────────────────────────────
    location ~ ^/api/v1/public/(ticker|products) {
        proxy_pass         http://eucx_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Pass-through Cache-Control headers from NestJS (s-maxage=30)
        proxy_pass_header  Cache-Control;
    }

    # ── All other API routes ───────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        limit_conn conn_limit_per_ip 20;

        proxy_pass         http://eucx_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_hide_header  X-Powered-By;
    }

    # ── Health (no rate limit, for load balancers) ────────────────────────────
    location = /api/v1/health {
        proxy_pass         http://eucx_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# grafana.eucx.exchange — Monitoring (IP-restricted)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name grafana.eucx.exchange;

    ssl_certificate     /etc/letsencrypt/live/eucx.exchange/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eucx.exchange/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:MozSSL:10m;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Restrict to operations team IPs ───────────────────────────────────────
    # Uncomment and set your office/VPN IP ranges:
    # allow 203.0.113.0/24;
    # deny all;

    location / {
        proxy_pass         http://eucx_grafana;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
