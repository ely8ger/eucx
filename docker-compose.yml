version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: eucx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eucx_dev}
      POSTGRES_USER: ${POSTGRES_USER:-eucx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eucx_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eucx} -d ${POSTGRES_DB:-eucx_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eucx-internal

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eucx_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eucx-internal

  # ─── Adminer (DB-Browser) ─────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: eucx_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eucx-internal

  # ─── API (Go Backend) ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: eucx_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-eucx}:${POSTGRES_PASSWORD:-eucx_secret}@postgres:5432/${POSTGRES_DB:-eucx_dev}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
      PORT: 3001
      ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - ./infra/certs:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eucx-internal
      - eucx-external

  # ─── Web (Next.js Frontend) ───────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: eucx_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - eucx-external

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  eucx-internal:
    driver: bridge
    internal: true      # kein direkter Internet-Zugriff für DB/Redis
  eucx-external:
    driver: bridge
