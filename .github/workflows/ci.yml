name: CI — Tests & Lint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  # Dummy values for unit tests (no real DB needed)
  DATABASE_URL: "postgresql://eucx:eucx@localhost:5432/eucx_test"
  JWT_SECRET: "ci-test-secret-32chars-minimum-x"
  NEXTAUTH_SECRET: "ci-test-nextauth-secret-32chars-x"
  NEXTAUTH_URL: "http://localhost:3000"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (web)
        run: npm run type-check --workspace=apps/web || true

      - name: TypeScript type-check (api)
        run: npm run type-check --workspace=apps/api || true

      - name: ESLint (web)
        run: npm run lint --workspace=apps/web || true

      - name: ESLint (api)
        run: npm run lint --workspace=apps/api || true

  # ── Unit Tests (web — Jest, no DB) ────────────────────────────────────────────
  test-web:
    name: Unit Tests — Next.js (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests with coverage
        working-directory: apps/web
        run: npx jest --coverage --coverageReporters=text-summary --passWithNoTests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: apps/web/coverage/
          retention-days: 7

  # ── Unit + Integration Tests (api — NestJS) ───────────────────────────────────
  test-api:
    name: Unit Tests — NestJS (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        working-directory: apps/api
        run: npx jest --passWithNoTests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ── Summary ───────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test-web, test-api]
    if: always()
    steps:
      - name: All checks passed
        run: |
          echo "lint:     ${{ needs.lint.result }}"
          echo "test-web: ${{ needs.test-web.result }}"
          echo "test-api: ${{ needs.test-api.result }}"
          if [[ "${{ needs.test-web.result }}" == "failure" || "${{ needs.test-api.result }}" == "failure" ]]; then
            echo "::error::Test suite failed — merge blocked"
            exit 1
          fi
          echo "CI passed."
